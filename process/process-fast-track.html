<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

/* ─── DESIGN TOKENS ─────────────────────────────────────────────── */
:root[data-theme="light"]{
  --bg:#faf8f4;--bg-elev:#ffffff;--bg-soft:#f3efe7;--bg-inset:#ede7da;
  --ink:#1e2f4a;--ink-2:#4a5568;--ink-3:#8a8a82;--ink-4:#b8b3a8;
  --gold:#9a7d3f;--gold-2:#b89a6a;
  --gold-soft:rgba(184,154,106,0.12);
  --gold-line:rgba(154,125,63,0.32);
  --line:rgba(30,47,74,0.10);--line-2:rgba(30,47,74,0.16);
  --shadow-sm:0 1px 2px rgba(30,47,74,0.04),0 1px 3px rgba(30,47,74,0.06);
  --shadow-md:0 2px 4px rgba(30,47,74,0.04),0 8px 24px rgba(30,47,74,0.08);
  --shadow-lg:0 4px 12px rgba(30,47,74,0.06),0 16px 40px rgba(30,47,74,0.10);
  --img-now:brightness(1) saturate(1) contrast(1);
  --img-done:brightness(0.95) saturate(0.55) contrast(0.95);
  --img-next:brightness(0.98) saturate(0.4) contrast(0.92);
  --halo:rgba(184,154,106,0.18);
  --logo-invert:0;
}
:root[data-theme="dark"]{
  --bg:#131c2e;--bg-elev:#1a2540;--bg-soft:#1f2c4a;--bg-inset:#0f1726;
  --ink:#f5f2ea;--ink-2:rgba(245,242,234,0.72);--ink-3:rgba(245,242,234,0.45);--ink-4:rgba(245,242,234,0.28);
  --gold:#d4b878;--gold-2:#b89a6a;
  --gold-soft:rgba(212,184,120,0.10);
  --gold-line:rgba(212,184,120,0.30);
  --line:rgba(245,242,234,0.08);--line-2:rgba(245,242,234,0.14);
  --shadow-sm:0 1px 2px rgba(0,0,0,0.20),0 1px 3px rgba(0,0,0,0.30);
  --shadow-md:0 2px 4px rgba(0,0,0,0.25),0 8px 24px rgba(0,0,0,0.35);
  --shadow-lg:0 4px 12px rgba(0,0,0,0.30),0 16px 40px rgba(0,0,0,0.45);
  --img-now:brightness(1) saturate(1);
  --img-done:brightness(0.72) saturate(0.7);
  --img-next:brightness(0.5) saturate(0.5);
  --halo:rgba(212,184,120,0.22);
  --logo-invert:1;
}

html{scroll-behavior:smooth;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background-color .25s ease,color .25s ease;
}

/* ─── NAV ───────────────────────────────────────────────────────── */
.nav{
  position:sticky;top:0;z-index:100;
  background:color-mix(in srgb,var(--bg) 92%,transparent);
  backdrop-filter:blur(20px) saturate(1.2);
  -webkit-backdrop-filter:blur(20px) saturate(1.2);
  border-bottom:1px solid var(--line);
  padding:0 28px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-back{
  font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-2);text-decoration:none;
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;border:1px solid var(--line-2);border-radius:6px;
  transition:all .18s ease;
}
.nav-back::before{content:'←';font-size:13px;color:var(--gold);}
.nav-back:hover{color:var(--ink);border-color:var(--gold-line);background:var(--gold-soft);}
.nav-right{display:flex;align-items:center;gap:14px;}
.nav-logo{height:32px;width:auto;display:block;opacity:.95;filter:invert(var(--logo-invert));transition:filter .25s;}

/* THEME TOGGLE */
.theme-toggle{
  width:52px;height:28px;border-radius:999px;
  background:var(--bg-inset);border:1px solid var(--line-2);
  position:relative;cursor:pointer;padding:0;
  transition:background-color .25s,border-color .25s;
}
.theme-toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:22px;height:22px;border-radius:50%;
  background:var(--gold);
  transition:transform .28s cubic-bezier(.4,0,.2,1),background-color .25s;
  box-shadow:var(--shadow-sm);
}
:root[data-theme="dark"] .theme-toggle::after{transform:translateX(24px);}

/* ─── HERO ──────────────────────────────────────────────────────── */
.hero{
  padding:64px 32px 48px;text-align:center;
  border-bottom:1px solid var(--line);position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% -20%,var(--gold-soft) 0%,transparent 60%);
  pointer-events:none;
}
.hero-eye{
  display:inline-block;
  font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);
  border:1px solid var(--gold-line);
  padding:6px 16px;border-radius:999px;margin-bottom:22px;
  background:var(--gold-soft);
}
.hero h1{
  font-family:'Newsreader',Georgia,serif;font-weight:300;letter-spacing:-.025em;
  font-size:clamp(32px,5vw,56px);
  color:var(--ink);margin-bottom:12px;line-height:1.05;
}
.hero-sub{
  font-family:'Newsreader',Georgia,serif;font-style:italic;font-weight:300;
  font-size:15px;color:var(--ink-3);
}

/* ─── MAIN ──────────────────────────────────────────────────────── */
.main{max-width:980px;margin:0 auto;padding:0 24px;}

/* ─── ROUTE TOGGLE ──────────────────────────────────────────────── */
.route-sec{padding:36px 0 0;}
.section-lbl{
  font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;
}
.route-row{display:flex;gap:10px;}
.rbtn{
  flex:1;padding:16px 20px;border-radius:12px;
  border:1px solid var(--line-2);background:var(--bg-elev);
  cursor:pointer;text-align:left;
  transition:all .18s ease;
  font-family:inherit;color:var(--ink-2);
  box-shadow:var(--shadow-sm);
}
.rbtn:hover{border-color:var(--gold-line);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.rbtn.active{background:var(--gold-soft);border-color:var(--gold);color:var(--ink);box-shadow:var(--shadow-md);}
.rbtn-t{font-size:14px;font-weight:500;display:block;margin-bottom:3px;}
.rbtn-s{font-size:11px;font-weight:400;color:var(--ink-3);}
.rbtn.active .rbtn-s{color:var(--ink-2);}
@media(max-width:520px){.route-row{flex-direction:column;}}

/* ─── PROGRESS ──────────────────────────────────────────────────── */
.prog-sec{padding:24px 0 14px;}
.prog-track{height:2px;background:var(--bg-inset);border-radius:2px;overflow:hidden;}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold-2),var(--gold));
  border-radius:2px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.prog-meta{
  display:flex;justify-content:space-between;margin-top:8px;
  font-size:11px;color:var(--ink-4);font-weight:500;
}

/* ─── STAGE STRIP ───────────────────────────────────────────────── */
.strip-sec{padding:18px 0 24px;}
.strip{display:flex;align-items:flex-start;gap:0;position:relative;}
.strip::before{
  content:'';position:absolute;top:58px;left:58px;right:58px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-line) 12%,var(--gold-line) 88%,transparent);
  z-index:0;
}
.sitem{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:11px;
  cursor:pointer;position:relative;z-index:1;padding:0 4px;
}
.sframe{
  width:112px;height:112px;border-radius:18px;overflow:hidden;position:relative;
  border:1.5px solid var(--line-2);background:var(--bg-soft);
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
  flex-shrink:0;box-shadow:var(--shadow-sm);
}
.simg{width:100%;height:100%;object-fit:cover;display:block;filter:var(--img-next);transition:filter .22s ease;}

.sitem.done .sframe{border-color:var(--gold-line);}
.sitem.done .simg{filter:var(--img-done);}
.sitem.done:hover .simg{filter:var(--img-now);}

.sitem.now .sframe{
  border-color:var(--gold);
  box-shadow:0 0 0 4px var(--halo),var(--shadow-md);
  transform:translateY(-3px);
}
.sitem.now .simg{filter:var(--img-now);}

.sitem.next .simg{filter:var(--img-next);}
.sitem.next:hover .simg{filter:var(--img-done);}

.sitem.selected .sframe{
  border-color:var(--gold)!important;
  box-shadow:0 0 0 4px var(--halo),var(--shadow-lg)!important;
  transform:translateY(-5px)!important;
}
.sitem.selected .simg{filter:var(--img-now)!important;}

.snum{
  position:absolute;bottom:7px;right:7px;
  width:24px;height:24px;border-radius:50%;
  background:var(--bg-elev);color:var(--ink-3);
  font-size:11px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line-2);backdrop-filter:blur(4px);
}
.sitem.done .snum{color:var(--gold);border-color:var(--gold-line);}
.sitem.now .snum,.sitem.selected .snum{background:var(--gold);color:#fff;border-color:var(--gold);}
.slabel{
  font-size:10px;font-weight:500;text-align:center;line-height:1.35;color:var(--ink-4);
  max-width:108px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;
  transition:color .2s,font-weight .2s;
}
.sitem.done .slabel{color:var(--ink-3);}
.sitem.now .slabel,.sitem.selected .slabel{color:var(--gold)!important;font-weight:600;}
.sarrow{display:flex;align-items:center;padding-bottom:46px;flex-shrink:0;width:14px;}
.sarrow-inner{width:14px;height:1px;background:var(--gold-line);}

@media(max-width:640px){
  .sframe{width:62px;height:62px;border-radius:12px;}
  .snum{width:18px;height:18px;font-size:9px;bottom:3px;right:3px;}
  .slabel{font-size:9px;max-width:62px;}
  .sarrow{width:6px;}
  .strip::before{top:32px;left:32px;right:32px;}
}

/* ─── PANEL ─────────────────────────────────────────────────────── */
.panel-wrap{padding-bottom:64px;}
.panel{
  background:var(--bg-elev);border:1px solid var(--line);border-radius:18px;overflow:hidden;
  box-shadow:var(--shadow-md);
  animation:panelIn .26s cubic-bezier(.4,0,.2,1);
}
@keyframes panelIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.panel-top{display:flex;align-items:stretch;}
.panel-img-col{
  width:160px;flex-shrink:0;overflow:hidden;
  border-right:1px solid var(--line);background:var(--bg-soft);
}
.panel-img-full{width:100%;height:100%;object-fit:cover;display:block;}
.panel-hdr{
  flex:1;padding:26px 28px 22px;border-bottom:1px solid var(--line);
  display:flex;flex-direction:column;justify-content:center;
}
.panel-eye{
  font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:8px;
}
.panel-title{
  font-family:'Newsreader',Georgia,serif;font-weight:300;letter-spacing:-.02em;
  font-size:clamp(20px,3vw,30px);color:var(--ink);margin-bottom:6px;line-height:1.15;
}
.panel-time{font-size:12px;color:var(--ink-3);font-style:italic;font-family:'Newsreader',Georgia,serif;}

.here-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--gold);color:#fff;
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:5px 11px;border-radius:999px;margin-top:10px;align-self:flex-start;
}
.here-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;background:#fff;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}

@media(max-width:520px){.panel-img-col{width:80px;}.panel-hdr{padding:18px;}}
.panel-body{padding:24px 28px 28px;}

/* Lead text */
.plead{
  font-family:'Newsreader',Georgia,serif;font-weight:300;font-style:italic;
  font-size:16px;color:var(--ink-2);line-height:1.7;margin-bottom:22px;
}

/* Doc box */
.doc-box{
  background:var(--bg-soft);border:1px solid var(--line);
  border-radius:12px;padding:18px 20px;margin-bottom:16px;
}
.doc-lbl{
  font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;
}
.ditem{
  display:flex;gap:12px;margin-bottom:11px;
  font-size:14px;color:var(--ink-2);line-height:1.55;align-items:flex-start;
}
.ditem:last-child{margin-bottom:0;}
.dn{
  width:22px;height:22px;border-radius:50%;
  background:var(--gold-soft);color:var(--gold);
  font-size:10px;font-weight:600;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
  border:1px solid var(--gold-line);
}
.ditem strong{color:var(--ink);font-weight:500;}
.ditem a{color:var(--gold);text-decoration:none;border-bottom:1px solid var(--gold-line);}
.ditem a:hover{border-bottom-color:var(--gold);}

/* PoA download buttons */
.poa-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:500;color:var(--gold);
  border:1px solid var(--gold-line);border-radius:6px;
  padding:5px 11px;text-decoration:none;
  background:var(--gold-soft);transition:all .18s;margin-left:6px;
  border-bottom:1px solid var(--gold-line);
}
.poa-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
.poa-btn::before{content:'↓';font-size:11px;}

/* NA box */
.na-box{
  border-left:2px solid var(--gold-line);
  padding:12px 16px;margin-bottom:16px;
  font-size:13px;color:var(--ink-3);line-height:1.6;font-style:italic;
  font-family:'Newsreader',Georgia,serif;
}
.na-lbl{
  font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);font-style:normal;font-family:'Inter',sans-serif;
  display:block;margin-bottom:5px;
}

/* Good to know */
.gk-box{
  background:var(--bg-inset);border:1px solid var(--line);
  border-radius:12px;padding:16px 20px;margin-bottom:16px;
}
.gk-lbl{
  font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-3);margin-bottom:10px;
}
.gk-item{
  display:flex;gap:10px;margin-bottom:8px;
  font-size:13px;color:var(--ink-2);line-height:1.55;align-items:flex-start;
}
.gk-item:last-child{margin-bottom:0;}
.gk-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:7px;}
.gk-item strong{color:var(--ink);font-weight:500;}

/* Tip */
.tip-txt{
  font-size:12px;color:var(--ink-3);font-style:italic;line-height:1.6;
  font-family:'Newsreader',Georgia,serif;
  padding:8px 14px;border-left:2px solid var(--line-2);
}

/* Reloc CTA */
.reloc-cta{
  background:var(--gold-soft);border:1px solid var(--gold-line);
  border-radius:12px;padding:16px 20px;margin-top:16px;
  font-size:13px;color:var(--ink-2);line-height:1.6;
}
.reloc-cta a{color:var(--gold);font-weight:500;text-decoration:none;border-bottom:1px solid var(--gold-line);}
.reloc-cta a:hover{border-bottom-color:var(--gold);}
.reloc-lbl{
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--gold);display:block;margin-bottom:6px;
}

/* Tracking tip */
.tracking-tip{
  background:var(--gold-soft);border:1px solid var(--gold-line);
  border-radius:12px;padding:14px 18px;margin-bottom:20px;
  font-size:13px;color:var(--ink-2);line-height:1.6;
  display:flex;gap:12px;align-items:flex-start;
}
.tracking-tip-icon{color:var(--gold);font-size:16px;flex-shrink:0;margin-top:1px;font-weight:600;}

/* FOOTER */
.guide-footer{
  text-align:center;padding:32px 24px 56px;
  font-size:12px;color:var(--ink-4);font-style:italic;
  font-family:'Newsreader',Georgia,serif;
  border-top:1px solid var(--line);
}
.guide-footer a{color:var(--gold);text-decoration:none;}
.guide-footer a:hover{text-decoration:underline;}
</style>
</head>

var CURR_KEY=getParam('step')||'introduction';
var route=(getParam('route')==='indk')?'indk':'abroad';
var open=null;

function getSteps(){
  return route==='indk'?ALL_STEPS.filter(function(s){return !s.abroadOnly;}):ALL_STEPS;
}
function getCurrIdx(steps){
  for(var i=0;i<steps.length;i++){if(steps[i].key===CURR_KEY)return i;}
  return 0;
}

// ─── INIT ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  if(typeof LOGO!=='undefined') document.getElementById('nav-logo').src=LOGO;

  document.getElementById('btn-abroad').classList.toggle('active',route==='abroad');
  document.getElementById('btn-indk').classList.toggle('active',route==='indk');
  document.getElementById('btn-abroad').addEventListener('click',function(){setRoute('abroad');});
  document.getElementById('btn-indk').addEventListener('click',function(){setRoute('indk');});

  document.getElementById('themeToggle').addEventListener('click',function(){
    var cur=document.documentElement.getAttribute('data-theme');
    var next=cur==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('na-theme',next);
  });

  var steps=getSteps();
  for(var i=0;i<steps.length;i++){
    if(steps[i].key===CURR_KEY){open=i;break;}
  }
  if(open===null) open=0;
  renderStrip(); renderPanel(); updateProgress();
});

function setRoute(r){
  route=r;
  document.getElementById('btn-abroad').classList.toggle('active',r==='abroad');
  document.getElementById('btn-indk').classList.toggle('active',r==='indk');
  var steps=getSteps();
  if(open!==null&&open>=steps.length) open=null;
  renderStrip(); renderPanel(); updateProgress();
}

function updateProgress(){
  var steps=getSteps();
  var fill=document.getElementById('prog-fill');
  var lbl=document.getElementById('prog-label');
  var cnt=document.getElementById('prog-count');
  if(open!==null){
    fill.style.width=Math.round(((open+1)/steps.length)*100)+'%';
    lbl.textContent=steps[open].title;
    cnt.textContent=(open+1)+' of '+steps.length;
  }else{
    fill.style.width='0%';
    lbl.textContent='Tap any step to see what it involves';
    cnt.textContent='';
  }
}

function toggleStep(i){
  open=(open===i)?null:i;
  renderStrip(); renderPanel(); updateProgress();
  if(open!==null){
    setTimeout(function(){
      var pw=document.getElementById('panel-wrap');
      if(pw&&pw.firstChild) pw.scrollIntoView({behavior:'smooth',block:'nearest'});
    },60);
  }
}

// ─── STRIP ────────────────────────────────────────────────────────
function renderStrip(){
  var strip=document.getElementById('step-strip');
  strip.innerHTML='';
  var steps=getSteps();
  var currIdx=getCurrIdx(steps);
  for(var i=0;i<steps.length;i++){
    var s=steps[i];
    var state=i<currIdx?'done':i===currIdx?'now':'next';
    var isSelected=(open===i);
    var item=document.createElement('div');
    item.className='sitem '+state+(isSelected?' selected':'');
    item.setAttribute('role','button');item.setAttribute('tabindex','0');
    item.setAttribute('aria-label','Step '+(i+1)+': '+s.label);
    (function(idx){
      item.addEventListener('click',function(){toggleStep(idx);});
      item.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleStep(idx);}});
    })(i);
    var frame=document.createElement('div');frame.className='sframe';
    var img=document.createElement('img');img.className='simg';
    img.src=(typeof IMGS!=='undefined'&&IMGS[s.key])?IMGS[s.key]:'';
    img.alt=s.label;frame.appendChild(img);
    var num=document.createElement('div');num.className='snum';num.textContent=i+1;frame.appendChild(num);
    item.appendChild(frame);
    var lbl=document.createElement('div');lbl.className='slabel';lbl.title=s.label;lbl.textContent=s.label;
    item.appendChild(lbl);
    strip.appendChild(item);
    if(i<steps.length-1){
      var arr=document.createElement('div');arr.className='sarrow';
      var inn=document.createElement('div');inn.className='sarrow-inner';arr.appendChild(inn);
      strip.appendChild(arr);
    }
  }
}

// ─── PANEL ────────────────────────────────────────────────────────
function e(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderPanel(){
  var wrap=document.getElementById('panel-wrap');
  if(open===null){wrap.innerHTML='';return;}
  var steps=getSteps();
  var s=steps[open];
  var currIdx=getCurrIdx(steps);
  var state=open<currIdx?'done':open===currIdx?'now':'next';
  var stateLabel=state==='now'?'Current stage':state==='done'?'Completed':'Upcoming';
  var badge=state==='now'?'<div class="here-badge">You are here</div>':'';
  var imgSrc=(typeof IMGS!=='undefined'&&IMGS[s.key])?IMGS[s.key]:'';
  var isAbroad=(route==='abroad');

  var trackHtml='';
  if(getParam('step')&&state==='now'){
    trackHtml='<div class="tracking-tip"><span class="tracking-tip-icon">&#9432;</span><span>Nordic Anchor has marked this as your current stage. When your case progresses, we\u2019ll send you an updated link showing your next stage.</span></div>';
  }

  var bodyHtml=trackHtml;
  bodyHtml+='<p class="plead">'+e(s.lead)+'</p>';

  for(var si=0;si<s.sections.length;si++){
    var sec=s.sections[si];

    if(sec.type==='overview'){
      bodyHtml+='<div class="doc-box"><div class="doc-lbl">Your 5-stage journey</div>';
      for(var k=0;k<sec.items.length;k++){
        bodyHtml+='<div class="ditem"><div class="dn">'+(k+1)+'</div><span>'+e(sec.items[k])+'</span></div>';
      }
      bodyHtml+='</div>';
    }

    if(sec.type==='docs'){
      bodyHtml+='<div class="doc-box"><div class="doc-lbl">'+e(sec.label)+'</div>';
      var dlHrefs={
        'poa-applicant':'../process/Power_of_attorney_from_applicant_en.pdf',
        'poa-employer':'../process/Power_of_attorney_from_employer_en.pdf'
      };
      for(var k=0;k<sec.items.length;k++){
        var itm=sec.items[k];
        var dlBtn=itm.dl?(' <a class="poa-btn" href="'+dlHrefs[itm.dl]+'" target="_blank" download>Download PoA template</a>'):'';
        bodyHtml+='<div class="ditem"><div class="dn">'+(k+1)+'</div><span>'+e(itm.text)+dlBtn+'</span></div>';
      }
      bodyHtml+='</div>';
    }

    if(sec.type==='bio'){
      if(sec.abroad && !isAbroad) continue;
      if(!sec.abroad && isAbroad) continue;

      if(isAbroad){
        bodyHtml+='<div class="doc-box"><div class="doc-lbl">Biometrics \u2014 applicant abroad</div>';
        bodyHtml+='<div class="ditem"><div class="dn">1</div><span>Go to <a href="https://um.dk/en/travel-and-residence/where-to-apply" target="_blank">um.dk/en/travel-and-residence/where-to-apply</a> and find your country of residence</span></div>';
        bodyHtml+='<div class="ditem"><div class="dn">2</div><span>Look for <strong>"Residence and work permit (long stay visa)"</strong> \u2014 the exact wording may vary by country</span></div>';
        bodyHtml+='<div class="ditem"><div class="dn">3</div><span>Follow the link to book your appointment at either: a VFS Global centre, a Danish embassy, or a Norwegian embassy (if Denmark has a representation agreement with Norway for your country)</span></div>';
        bodyHtml+='<div class="ditem"><div class="dn">4</div><span>Attend your appointment. Bring: your passport, all application documents, and passport-style photos. Pay the VFS/embassy fee on the day (approx. \u20ac250 at VFS \u2014 embassy fees vary)</span></div>';
        bodyHtml+='</div>';
        bodyHtml+='<div class="gk-box"><div class="gk-lbl">Three scenarios \u2014 which applies to you?</div>';
        bodyHtml+='<div class="gk-item"><div class="gk-dot"></div><span><strong>VFS Global centre</strong> \u2014 most common. Book online, attend in person, biometrics recorded on the day. Nordic Anchor will send you the direct booking link for your country.</span></div>';
        bodyHtml+='<div class="gk-item"><div class="gk-dot"></div><span><strong>Danish embassy</strong> \u2014 where no VFS centre exists. Contact the embassy directly to book. Process varies by location.</span></div>';
        bodyHtml+='<div class="gk-item"><div class="gk-dot"></div><span><strong>Norwegian embassy (identity verification only)</strong> \u2014 for countries where Denmark has a representation agreement with Norway. You visit the Norwegian embassy only for identity verification. Biometrics are then recorded at a SIRI branch office within 2 weeks of arriving in Denmark.</span></div>';
        bodyHtml+='</div>';
      } else {
        bodyHtml+='<div class="doc-box"><div class="doc-lbl">Biometrics \u2014 applicant in Denmark</div>';
        bodyHtml+='<div class="ditem"><div class="dn">1</div><span>Book an appointment at a SIRI branch office \u2014 this must happen within 14 days of submission</span></div>';
        bodyHtml+='<div class="ditem"><div class="dn">2</div><span>Offices: Copenhagen \u00b7 Aarhus \u00b7 Odense \u00b7 Aalborg \u2014 book at nyidanmark.dk</span></div>';
        bodyHtml+='<div class="ditem"><div class="dn">3</div><span>Bring: your passport and the submission confirmation from Nordic Anchor</span></div>';
        bodyHtml+='</div>';
        bodyHtml+='<p class="tip-txt">SIRI cannot begin processing your application until biometrics are recorded. Book as soon as you receive submission confirmation.</p>';
      }
    }

    if(sec.type==='na'){
      bodyHtml+='<div class="na-box"><span class="na-lbl">Nordic Anchor handles</span>'+e(sec.text)+'</div>';
    }

    if(sec.type==='gk'){
      bodyHtml+='<div class="gk-box"><div class="gk-lbl">'+e(sec.label)+'</div>';
      for(var k=0;k<sec.items.length;k++){
        bodyHtml+='<div class="gk-item"><div class="gk-dot"></div><span>'+e(sec.items[k])+'</span></div>';
      }
      bodyHtml+='</div>';
    }

    if(sec.type==='reloc'){
      bodyHtml+='<div class="reloc-cta"><span class="reloc-lbl">Nordic Anchor can help</span>Settling into Denmark involves a handful of essential administrative steps \u2014 CPR registration, opening a bank account, and activating your health insurance card. If you\u2019d like our assistance with any of these, <a href="mailto:rd@nordicanchor.dk">get in touch</a> and we\u2019ll walk you through it.</div>';
    }

    if(sec.type==='tip'){
      bodyHtml+='<p class="tip-txt">'+e(sec.text)+'</p>';
    }
  }

  wrap.innerHTML=
    '<div class="panel">'+
      '<div class="panel-top">'+
        '<div class="panel-img-col"><img class="panel-img-full" src="'+imgSrc+'" alt="'+e(s.label)+'"/></div>'+
        '<div class="panel-hdr">'+
          '<div class="panel-eye">Step '+(open+1)+' \u00b7 '+stateLabel+'</div>'+
          '<div class="panel-title">'+e(s.title)+'</div>'+
          '<div class="panel-time">'+e(s.time)+'</div>'+
          badge+
        '</div>'+
      '</div>'+
      '<div class="panel-body">'+bodyHtml+'</div>'+
    '</div>';
}
</script>
</body>
