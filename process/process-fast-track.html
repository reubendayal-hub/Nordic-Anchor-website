<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fast-Track Work Permit — Nordic Anchor Process Guide</title>
<meta name="description" content="Your step-by-step guide to the Fast-Track Pay Limit work permit process — Nordic Anchor Danish Immigration Consulting"/>
<link rel="icon" href="../favicon.jpg"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1e2f4a; --navy2:#2b3e5c;
  --gold:#b89a6a; --gold2:#B8860B; --gold-eye:#DAA520;
  --cream:#f9f6f2; --green:#2d6a4f;
  --muted:rgba(30,47,74,0.42);
}
html{scroll-behavior:smooth;}
body{
  font-family:'Newsreader',Georgia,serif;
  background:var(--cream);
  color:var(--navy);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── BACK NAV ── */
.back-bar{
  background:rgba(249,246,242,0.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(184,154,106,0.2);
  position:sticky;top:0;z-index:100;
  padding:14px 32px;
  display:flex;align-items:center;gap:16px;
}
.back-link{
  font-family:'Newsreader',serif;
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);text-decoration:none;
  display:flex;align-items:center;gap:8px;
  transition:color .2s;
}
.back-link:hover{color:var(--gold2);}
.back-link::before{content:'←';font-size:13px;}
.back-brand{
  margin-left:auto;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--navy);opacity:0.5;
}

/* ── PAGE HERO ── */
.page-hero{
  background:linear-gradient(160deg, var(--navy) 0%, #2b3e5c 100%);
  padding:56px 32px 48px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.page-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% 120%, rgba(184,154,106,0.12) 0%, transparent 70%);
}
.hero-eyebrow{
  display:inline-block;
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);border:1px solid rgba(184,154,106,0.3);
  padding:6px 16px;margin-bottom:20px;
  position:relative;
}
.hero-title{
  font-size:clamp(28px,4.5vw,44px);font-weight:300;
  color:#fff;letter-spacing:-.015em;line-height:1.15;
  margin-bottom:14px;position:relative;
}
.hero-sub{
  font-size:14px;font-style:italic;
  color:rgba(255,255,255,0.5);
  position:relative;
}

/* ── MAIN CONTAINER ── */
.container{max-width:860px;margin:0 auto;padding:0 24px;}

/* ── ROUTE TOGGLE ── */
.route-section{padding:32px 0 0;}
.route-label{
  font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold2);font-weight:600;
  margin-bottom:12px;font-family:Arial,sans-serif;
}
.route-row{display:flex;gap:10px;}
.rbtn{
  flex:1;padding:13px 16px;
  border-radius:10px;
  border:1px solid rgba(30,47,74,0.14);
  background:white;cursor:pointer;
  text-align:left;
  transition:all .18s;
  font-family:'Newsreader',Georgia,serif;
}
.rbtn:hover{border-color:var(--gold);background:#fffdf9;}
.rbtn.active{background:var(--navy);border-color:var(--navy);color:white;}
.rbtn-t{font-size:13px;font-weight:400;display:block;margin-bottom:2px;}
.rbtn-s{font-size:10px;font-family:Arial,sans-serif;opacity:0.5;}
@media(max-width:520px){
  .route-row{flex-direction:column;}
}

/* ── PROGRESS BAR ── */
.prog-section{padding:20px 0 16px;}
.prog-track{height:2px;background:rgba(30,47,74,0.08);border-radius:2px;}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--navy),var(--gold));
  border-radius:2px;
  transition:width .4s cubic-bezier(.4,0,.2,1);
}
.prog-meta{
  display:flex;justify-content:space-between;
  margin-top:6px;
  font-size:10px;font-family:Arial,sans-serif;
  color:rgba(30,47,74,0.35);
}

/* ── STEP STRIP ── */
.strip-section{padding-bottom:24px;}
.strip{
  display:flex;align-items:flex-start;
  gap:0;
  position:relative;
}
.strip::before{
  content:'';position:absolute;
  top:56px;left:56px;right:56px;
  height:1px;
  background:rgba(30,47,74,0.1);
  z-index:0;
}
.sitem{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:9px;
  cursor:pointer;position:relative;z-index:1;
  padding:0 3px;
}
/* Square frame — matches reference illustrations */
.sframe{
  width:108px;height:108px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  border:2px solid rgba(30,47,74,0.1);
  background:white;
  transition:transform .2s, box-shadow .2s, border-color .2s;
  flex-shrink:0;
}
.sitem:hover .sframe{
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(30,47,74,0.12);
  border-color:rgba(184,154,106,0.4);
}
.sitem.done .sframe{
  border-color:rgba(184,154,106,0.5);
  box-shadow:0 2px 12px rgba(184,154,106,0.1);
}
.sitem.now .sframe{
  border-color:var(--navy);
  box-shadow:0 0 0 3px rgba(30,47,74,0.08), 0 6px 24px rgba(30,47,74,0.15);
  transform:translateY(-2px);
}
.sitem.next .sframe{
  opacity:0.55;
  filter:grayscale(0.2);
}
.simg{width:100%;height:100%;object-fit:cover;display:block;}
.snum{
  position:absolute;bottom:6px;right:6px;
  width:22px;height:22px;border-radius:50%;
  background:var(--navy);color:white;
  font-family:Arial,sans-serif;font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
}
.sitem.done .snum,.sitem.now .snum{background:var(--gold2);}
.slabel{
  font-family:Arial,sans-serif;font-size:9px;
  text-align:center;line-height:1.35;
  color:rgba(30,47,74,0.38);
  max-width:104px;
}
.sitem.now .slabel{color:var(--navy);font-weight:700;}
.sitem.done .slabel{color:rgba(30,47,74,0.55);}

/* Arrow connectors */
.sarrow{
  display:flex;align-items:center;
  padding-bottom:48px;flex-shrink:0;
  width:12px;
}
.sarrow-inner{
  width:12px;height:1px;
  background:rgba(30,47,74,0.1);
  position:relative;
}

@media(max-width:640px){
  .sframe{width:60px;height:60px;border-radius:12px;}
  .snum{width:18px;height:18px;font-size:8px;}
  .slabel{font-size:8px;max-width:60px;}
  .sarrow{width:6px;}
  .strip::before{top:32px;left:34px;right:34px;}
}

/* ── DETAIL PANEL ── */
.panel-wrap{padding-bottom:48px;}
.panel{
  background:white;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(30,47,74,0.1);
  box-shadow:0 4px 32px rgba(30,47,74,0.08);
  animation:panelIn .25s cubic-bezier(.4,0,.2,1);
}
@keyframes panelIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

/* Panel top — image sidebar + header text */
.panel-top{display:flex;align-items:stretch;}
.panel-img-col{
  width:120px;flex-shrink:0;
  overflow:hidden;
  background:var(--cream);
  border-right:1px solid rgba(30,47,74,0.07);
}
.panel-img-full{
  width:100%;height:100%;
  object-fit:cover;display:block;
}
.panel-hdr{
  flex:1;padding:20px 20px 18px;
  border-bottom:1px solid rgba(30,47,74,0.07);
  display:flex;flex-direction:column;justify-content:center;
}
.panel-step-eye{
  font-size:9px;font-family:Arial,sans-serif;
  font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold2);margin-bottom:5px;
}
.panel-title{
  font-size:clamp(18px,3vw,24px);font-weight:300;
  color:var(--navy);letter-spacing:-.01em;
  margin-bottom:4px;
}
.panel-time{
  font-size:11px;font-family:Arial,sans-serif;
  color:var(--muted);font-style:italic;
}
.here-badge{
  display:inline-block;
  background:var(--navy);color:white;
  font-family:Arial,sans-serif;font-size:8px;
  font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 9px;border-radius:20px;
  margin-top:7px;align-self:flex-start;
}
@media(max-width:520px){
  .panel-img-col{width:80px;}
  .panel-hdr{padding:16px;}
}

/* Panel body */
.panel-body{padding:18px 20px 22px;}
.rdiff{
  border-radius:8px;padding:10px 13px;
  margin:0 0 14px;
  font-size:12px;font-family:Arial,sans-serif;
  line-height:1.6;font-style:italic;
}
.rdiff.ra{
  background:#e8edf3;color:var(--navy);
  border-left:3px solid var(--navy);
}
.rdiff.rb{
  background:#f5efe6;color:#7a5c1e;
  border-left:3px solid var(--gold);
}
.plead{
  font-family:'Newsreader',Georgia,serif;
  font-size:14px;font-weight:300;
  color:rgba(30,47,74,0.58);
  line-height:1.75;font-style:italic;
  margin-bottom:16px;
}
/* You action box */
.you-box{
  background:var(--cream);
  border-radius:10px;padding:14px 16px;
  margin-bottom:12px;
}
.you-lbl{
  font-size:9px;font-family:Arial,sans-serif;
  font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold2);margin-bottom:8px;
}
.yitem{
  display:flex;gap:10px;
  margin-bottom:7px;
  font-family:Arial,sans-serif;font-size:13px;
  color:var(--navy);line-height:1.5;
  align-items:flex-start;
}
.yitem:last-child{margin-bottom:0;}
.yn{
  width:20px;height:20px;border-radius:50%;
  background:var(--navy);color:white;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
}
/* Nordic Anchor box */
.na-box{
  border-left:2px solid rgba(184,154,106,0.4);
  padding:10px 14px;margin-bottom:12px;
  font-family:Arial,sans-serif;font-size:12px;
  color:rgba(30,47,74,0.45);line-height:1.6;
  font-style:italic;
}
.na-lbl{
  font-size:8px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold2);font-style:normal;
  display:block;margin-bottom:4px;
}
.tip-txt{
  font-family:Arial,sans-serif;font-size:11px;
  color:rgba(30,47,74,0.35);
  font-style:italic;line-height:1.6;
}

/* ── FOOTER NOTE ── */
.guide-footer{
  text-align:center;
  padding:32px 24px 48px;
  font-family:Arial,sans-serif;font-size:11px;
  color:rgba(30,47,74,0.35);font-style:italic;
  border-top:1px solid rgba(30,47,74,0.08);
  margin-top:8px;
}
.guide-footer a{
  color:var(--gold2);text-decoration:none;
}
.guide-footer a:hover{text-decoration:underline;}
</style>
</head>

function go(r) {
  route = r;
  document.getElementById('ba').classList.toggle('active', r === 'abroad');
  document.getElementById('bi').classList.toggle('active', r === 'indk');
  if (open !== null) renderPanel();
}

function tog(i) {
  if (open === i) { open = null; }
  else { open = i; }

  const pct = open !== null ? Math.round(((open + 1) / STEPS.length) * 100) : 0;
  document.getElementById('pf').style.width = pct + '%';
  if (open !== null) {
    document.getElementById('pl').textContent = STEPS[open].title;
    document.getElementById('pc').textContent = (open + 1) + ' of ' + STEPS.length;
  } else {
    document.getElementById('pl').textContent = 'Tap any step to see what it involves';
    document.getElementById('pc').textContent = '';
  }

  renderStrip();
  renderPanel();

  // Scroll panel into view on mobile
  if (open !== null) {
    setTimeout(() => {
      const pw = document.getElementById('panel-wrap');
      if (pw && pw.firstChild) {
        pw.scrollIntoView({behavior:'smooth', block:'nearest'});
      }
    }, 50);
  }
}

function renderStrip() {
  const strip = document.getElementById('strip');
  strip.innerHTML = '';
  STEPS.forEach((s, i) => {
    const state = i < CURR ? 'done' : i === CURR ? 'now' : 'next';
    const isOpen = open === i;

    const div = document.createElement('div');
    div.className = 'sitem ' + state;
    div.setAttribute('role', 'button');
    div.setAttribute('aria-label', 'Step ' + (i+1) + ': ' + s.label);
    div.onclick = () => tog(i);

    div.innerHTML = `
      <div class="sframe" style="${isOpen ? 'transform:translateY(-4px);border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,47,74,0.1),0 8px 28px rgba(30,47,74,0.18);' : ''}">
        <img class="simg" src="${IMGS[s.key]}" alt="${s.label}" loading="lazy"/>
        <div class="snum">${i + 1}</div>
      </div>
      <div class="slabel">${s.label}</div>`;

    strip.appendChild(div);

    if (i < STEPS.length - 1) {
      const arr = document.createElement('div');
      arr.className = 'sarrow';
      arr.innerHTML = '<div class="sarrow-inner"></div>';
      strip.appendChild(arr);
    }
  });
}

function renderPanel() {
  const wrap = document.getElementById('panel-wrap');
  if (open === null) {
    wrap.innerHTML = '';
    return;
  }

  const s = STEPS[open];
  const state = open < CURR ? 'done' : open === CURR ? 'now' : 'next';
  const isAbroad = route === 'abroad';

  const diffHtml = (s.abroad && s.indk)
    ? `<div class="rdiff ${isAbroad ? 'ra' : 'rb'}">${isAbroad ? s.abroad : s.indk}</div>`
    : '';

  const you = s.you.map((y, j) =>
    `<div class="yitem"><div class="yn">${j+1}</div><span>${y}</span></div>`
  ).join('');

  const stateLabel = state === 'now' ? 'Current stage' : state === 'done' ? 'Completed' : 'Upcoming';

  wrap.innerHTML = `
    <div class="panel">
      <div class="panel-top">
        <div class="panel-img-col">
          <img class="panel-img-full" src="${IMGS[s.key]}" alt="${s.label}"/>
        </div>
        <div class="panel-hdr">
          <div class="panel-step-eye">Step ${open + 1} · ${stateLabel}</div>
          <div class="panel-title">${s.title}</div>
          <div class="panel-time">${s.time}</div>
          ${state === 'now' ? '<div class="here-badge">You are here</div>' : ''}
        </div>
      </div>
      <div class="panel-body">
        ${diffHtml}
        <p class="plead">${s.lead}</p>
        <div class="you-box">
          <div class="you-lbl">${s.youH}</div>
          ${you}
        </div>
        <div class="na-box">
          <span class="na-lbl">Nordic Anchor handles</span>
          ${s.na}
        </div>
        <p class="tip-txt">${s.tip}</p>
      </div>
    </div>`;
}

// Init
renderStrip();
// Open the current step by default
tog(CURR);
